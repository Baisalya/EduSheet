name: edusheet
description: "Offline teacher-focused mathematics worksheet creator app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  math_keyboard: ^0.3.3
  flutter_math_fork: ^0.7.4
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_html: ^3.0.0
  image_picker: ^1.2.2
  image_cropper: ^8.0.2
  google_mlkit_text_recognition: ^0.14.0
  path_provider: ^2.1.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  uuid: ^4.5.3
  flutter_quill: ^11.5.0
  html: ^0.15.6
  vsc_quill_delta_to_html: ^1.0.5
  lottie: ^3.1.2
  permission_handler: ^11.3.1
  open_filex: ^4.5.0
  path: ^1.9.0
  intl: ^0.20.2
  device_info_plus: ^11.5.0
  syncfusion_flutter_pdfviewer: ^28.2.7
  docx_file_viewer: ^1.0.1

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

  # APP ICON PACKAGE
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  xml: ^6.5.0
  petitparser: ^6.0.0

# APP ICON CONFIGURATION
flutter_launcher_icons:
  android: true
  ios: true

  # MAIN LOGO
  image_path: "assets/Applogo.png"

  # ANDROID 8+ ADAPTIVE ICON
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/Applogo.png"

  # OPTIONAL
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:

  uses-material-design: true

  assets:
    - assets/Applogo.png
    - assets/lottie/
